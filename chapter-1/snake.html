<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可爱贪食蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd9 100%);
            font-family: 'Microsoft YaHei', sans-serif;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            color: #c2185b;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .score-board {
            font-size: 1.5rem;
            color: #e91e63;
            margin-bottom: 15px;
            font-weight: bold;
        }

        #gameCanvas {
            border: 4px solid #ec407a;
            border-radius: 15px;
            background-color: #fff0f5;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }

        .instructions {
            margin-top: 15px;
            color: #c2185b;
            font-size: 1rem;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-box {
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd9 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 4px solid #ec407a;
        }

        .modal-box h2 {
            color: #c2185b;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .modal-box p {
            color: #e91e63;
            font-size: 1.3rem;
            margin-bottom: 25px;
        }

        .btn {
            background: linear-gradient(135deg, #f06292 0%, #e91e63 100%);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(233,30,99,0.4);
        }

        .pause-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 240, 245, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            border-radius: 11px;
            z-index: 10;
        }

        .pause-text {
            color: #c2185b;
            font-size: 2.5rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .canvas-wrapper {
            position: relative;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>可爱贪食蛇</h1>
        <div class="score-board">得分: <span id="score">0</span></div>
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div class="pause-overlay" id="pauseOverlay">
                <span class="pause-text">已暂停</span>
            </div>
        </div>
        <p class="instructions">方向键 ↑ ↓ ← → 移动 | 空格键 暂停/继续</p>
    </div>

    <div class="overlay" id="gameOverOverlay">
        <div class="modal-box">
            <h2>游戏结束</h2>
            <p>最终得分: <span id="finalScore">0</span></p>
            <button class="btn" id="restartBtn">再来一局</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const finalScoreElement = document.getElementById('finalScore');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const pauseOverlay = document.getElementById('pauseOverlay');
        const restartBtn = document.getElementById('restartBtn');

        const gridSize = 20;
        const tileCount = 20;
        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let gameRunning = false;
        let isPaused = false;
        let gameLoop = null;

        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            isPaused = false;
            scoreElement.textContent = score;
            placeFood();
            gameOverOverlay.style.display = 'none';
            pauseOverlay.style.display = 'none';
            gameRunning = true;

            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, 150);
        }

        function placeFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(seg => seg.x === food.x && seg.y === food.y));
        }

        function drawSegment(x, y, isHead, index) {
            const padding = 1.5;
            const size = gridSize - padding * 2;
            const centerX = x * gridSize + gridSize / 2;
            const centerY = y * gridSize + gridSize / 2;

            // 蛇身渐变粉色
            const redValue = isHead ? 255 : Math.max(200, 240 - index * 5);
            const color = `rgb(${redValue}, ${isHead ? 120 : 100 + index * 2}, ${redValue - 40})`;

            // 绘制阴影
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.beginPath();
            ctx.ellipse(centerX + 2, centerY + 3, size / 2, size / 2.5, 0, 0, Math.PI * 2);
            ctx.fill();

            // 绘制主体（圆形）
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(centerX, centerY, size / 2, 0, Math.PI * 2);
            ctx.fill();

            // 头部高光
            if (isHead) {
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.beginPath();
                ctx.arc(centerX - 3, centerY - 4, 4, 0, Math.PI * 2);
                ctx.fill();
            }

            // 头部绘制
            if (isHead) {
                // 眼睛
                ctx.fillStyle = 'white';
                const eyeSize = 4.5;

                let eyeX1, eyeY1, eyeX2, eyeY2;
                if (direction.x === 1) {
                    eyeX1 = eyeX2 = centerX + 2;
                    eyeY1 = centerY - 4;
                    eyeY2 = centerY + 4;
                } else if (direction.x === -1) {
                    eyeX1 = eyeX2 = centerX - 2;
                    eyeY1 = centerY - 4;
                    eyeY2 = centerY + 4;
                } else if (direction.y === 1) {
                    eyeY1 = eyeY2 = centerY + 2;
                    eyeX1 = centerX - 4;
                    eyeX2 = centerX + 4;
                } else {
                    eyeY1 = eyeY2 = centerY - 2;
                    eyeX1 = centerX - 4;
                    eyeX2 = centerX + 4;
                }

                ctx.beginPath();
                ctx.arc(eyeX1, eyeY1, eyeSize, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(eyeX2, eyeY2, eyeSize, 0, Math.PI * 2);
                ctx.fill();

                // 眼珠
                ctx.fillStyle = '#880e4f';
                const pupilOffsetX = direction.x * 1.5;
                const pupilOffsetY = direction.y * 1.5;
                ctx.beginPath();
                ctx.arc(eyeX1 + pupilOffsetX, eyeY1 + pupilOffsetY, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(eyeX2 + pupilOffsetX, eyeY2 + pupilOffsetY, 2, 0, Math.PI * 2);
                ctx.fill();

                // 腮红
                ctx.fillStyle = 'rgba(255, 150, 150, 0.4)';
                ctx.beginPath();
                ctx.ellipse(centerX - 6, centerY, 3, 2, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(centerX + 6, centerY, 3, 2, 0, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawFood() {
            const cx = food.x * gridSize + gridSize / 2;
            const cy = food.y * gridSize + gridSize / 2;

            // 绘制香蕉阴影
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.beginPath();
            ctx.ellipse(cx + 2, cy + 4, 8, 5, Math.PI / 6, 0, Math.PI * 2);
            ctx.fill();

            // 绘制香蕉主体（弧形）
            ctx.fillStyle = '#ffe135';
            ctx.beginPath();
            ctx.ellipse(cx, cy + 2, 7, 10, Math.PI / 6, 0, Math.PI * 2);
            ctx.fill();

            // 香蕉顶部（深色部分）
            ctx.fillStyle = '#c9a227';
            ctx.beginPath();
            ctx.ellipse(cx + 5, cy - 6, 3, 2, Math.PI / 4, 0, Math.PI * 2);
            ctx.fill();

            // 香蕉底部
            ctx.fillStyle = '#c9a227';
            ctx.beginPath();
            ctx.ellipse(cx - 3, cy + 10, 2, 2, Math.PI / 6, 0, Math.PI * 2);
            ctx.fill();

            // 高光
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.beginPath();
            ctx.ellipse(cx - 1, cy, 2, 5, Math.PI / 8, 0, Math.PI * 2);
            ctx.fill();
        }

        function draw() {
            // 清空画布
            ctx.fillStyle = '#fff0f5';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格（可选装饰）
            ctx.strokeStyle = 'rgba(236, 64, 122, 0.1)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 绘制食物
            drawFood();

            // 绘制蛇
            snake.forEach((segment, index) => {
                drawSegment(segment.x, segment.y, index === 0, index);
            });
        }

        function update() {
            if (!gameRunning || isPaused) return;

            direction = { ...nextDirection };

            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // 碰撞检测
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 检测是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                placeFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            finalScoreElement.textContent = score;
            gameOverOverlay.style.display = 'flex';
        }

        function togglePause() {
            if (!gameRunning) return;

            isPaused = !isPaused;
            pauseOverlay.style.display = isPaused ? 'flex' : 'none';
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                togglePause();
                return;
            }

            if (!gameRunning || isPaused) {
                if (e.key === 'Enter') {
                    initGame();
                }
                return;
            }

            switch (e.key) {
                case 'ArrowUp':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        });

        restartBtn.addEventListener('click', initGame);

        // 初始绘制背景
        ctx.fillStyle = '#fff0f5';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        initGame();
    </script>
</body>
</html>
