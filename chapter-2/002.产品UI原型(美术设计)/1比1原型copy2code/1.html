<!DOCTYPE html>
<html lang="zh-CN" style="">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>轻账本 - 登录</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&amp;display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed": "#8bf3f3",
                        "secondary-fixed-dim": "#ffb4aa",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed": "#410001",
                        "on-secondary-fixed-variant": "#871f19",
                        "on-error": "#ffffff",
                        "on-secondary-container": "#710d0b",
                        "background": "#f8fafb",
                        "text-secondary": "#6A7178",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#3d4949",
                        "surface-container-low": "#f2f4f5",
                        "on-background": "#191c1d",
                        "surface-container-highest": "#e1e3e4",
                        "surface-bright": "#f8fafb",
                        "error": "#ba1a1a",
                        "income-teal": "#4EBABA",
                        "primary-container": "#4ebaba",
                        "primary": "#006a6a",
                        "tertiary": "#924b25",
                        "secondary-fixed": "#ffdad5",
                        "tertiary-container": "#ee9468",
                        "surface-white": "#FFFFFF",
                        "surface-container-high": "#e6e8e9",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed": "#002020",
                        "tertiary-fixed": "#ffdbcc",
                        "on-primary": "#ffffff",
                        "primary-fixed-dim": "#6ed7d7",
                        "error-container": "#ffdad6",
                        "expense-red": "#F26D5F",
                        "outline-variant": "#bcc9c8",
                        "surface-dim": "#d8dadb",
                        "on-tertiary-container": "#6b2c08",
                        "inverse-surface": "#2e3132",
                        "inverse-on-surface": "#eff1f2",
                        "tertiary-fixed-dim": "#ffb693",
                        "on-tertiary-fixed-variant": "#75340f",
                        "on-surface": "#191c1d",
                        "on-error-container": "#93000a",
                        "surface-tint": "#006a6a",
                        "inverse-primary": "#6ed7d7",
                        "outline": "#6d7979",
                        "secondary": "#a8372d",
                        "on-primary-container": "#004747",
                        "surface-variant": "#e1e3e4",
                        "surface-container": "#eceeef",
                        "text-primary": "#1A1C1E",
                        "on-tertiary-fixed": "#351000",
                        "secondary-container": "#ff7768",
                        "on-primary-fixed-variant": "#004f50",
                        "surface": "#f8fafb"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-lg": "24px",
                        "gutter": "12px",
                        "stack-md": "16px",
                        "base": "4px",
                        "margin-tablet": "24px",
                        "stack-sm": "8px",
                        "margin-mobile": "16px"
                    },
                    "fontFamily": {
                        "headline-md": ["Manrope", "sans-serif"],
                        "label-caps": ["Manrope", "sans-serif"],
                        "headline-lg": ["Manrope", "sans-serif"],
                        "body-md": ["Manrope", "sans-serif"],
                        "num-md": ["Manrope", "sans-serif"],
                        "headline-lg-mobile": ["Manrope", "sans-serif"],
                        "display-num": ["Manrope", "sans-serif"],
                        "body-lg": ["Manrope", "sans-serif"]
                    },
                    "fontSize": {
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "700" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "num-md": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "display-num": ["40px", { "lineHeight": "48px", "letterSpacing": "-1px", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #f8fafb;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .brand-gradient {
            background: linear-gradient(135deg, #006a6a 0%, #4ebaba 100%);
        }

        .pattern-overlay {
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
        }
    </style>
</head>

<body class="bg-background text-on-background min-h-screen overflow-hidden">
    <div class="flex min-h-screen">
        <!-- Left Side: Visual/Brand Content -->
        <div class="hidden lg:flex lg:w-1/2 brand-gradient relative items-center justify-center p-12 overflow-hidden">
            <div class="absolute inset-0 pattern-overlay opacity-30"></div>
            <div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] bg-white/10 rounded-full blur-[120px]"></div>
            <div
                class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-primary-fixed/20 rounded-full blur-[100px]">
            </div>
            <div class="relative z-10 text-white max-w-lg animate-in fade-in slide-in-from-left-8 duration-1000">
                <div
                    class="w-20 h-20 bg-white/20 backdrop-blur-md rounded-2xl flex items-center justify-center mb-stack-lg shadow-xl border border-white/30">
                    <span class="material-symbols-outlined text-white text-[48px]">account_balance_wallet</span>
                </div>
                <h1 class="text-[56px] font-bold leading-tight mb-stack-md">轻账本</h1>
                <p class="text-[20px] font-body-lg opacity-90 leading-relaxed mb-stack-lg">
                    繁至极简，美而有序。为您提供最纯粹的财务管理体验，让每一分收支都清晰可见。
                </p>
                <div class="flex gap-stack-lg pt-stack-md border-t border-white/20">
                    <div>
                        <div class="text-[24px] font-bold">10k+</div>
                        <div class="text-sm opacity-70">活跃用户</div>
                    </div>
                    <div>
                        <div class="text-[24px] font-bold">100%</div>
                        <div class="text-sm opacity-70">隐私安全</div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Right Side: Login Form -->
        <div class="flex-1 flex flex-col items-center justify-center p-margin-mobile md:p-12 bg-surface-white relative">
            <!-- Background Decoration for Mobile/Tablet -->
            <div class="lg:hidden fixed inset-0 overflow-hidden pointer-events-none opacity-10">
                <div
                    class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary-container rounded-full blur-[120px]">
                </div>
            </div>
            <main class="w-full max-w-[480px] animate-in fade-in slide-in-from-right-8 duration-700">
                <!-- Mobile Header Only -->
                <div class="lg:hidden flex flex-col items-center mb-stack-lg">
                    <div class="w-14 h-14 bg-primary-container rounded-xl flex items-center justify-center mb-stack-md">
                        <span
                            class="material-symbols-outlined text-on-primary text-[28px]">account_balance_wallet</span>
                    </div>
                    <h1 class="font-headline-lg text-primary">轻账本</h1>
                </div>
                <header class="mb-10 text-center lg:text-left">
                    <h2 class="text-[32px] font-bold text-on-surface mb-2">欢迎回来</h2>
                    <p class="font-body-lg text-text-secondary">登录您的账号以继续管理财务</p>
                </header>
                <form class="space-y-6" onsubmit="return false;">
                    <!-- Username -->
                    <div class="space-y-2">
                        <label class="font-label-caps text-label-caps text-on-surface-variant block ml-1"
                            for="username">用户名</label>
                        <div class="relative group">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[22px] transition-colors group-focus-within:text-primary">person</span>
                            <input
                                class="w-full bg-surface-container-low border border-outline-variant/50 rounded-xl py-4 pl-12 pr-4 font-body-lg text-body-lg outline-none transition-all focus:border-primary focus:ring-1 focus:ring-primary focus:bg-white"
                                id="username" placeholder="请输入您的用户名或邮箱" type="text">
                        </div>
                    </div>
                    <!-- Password -->
                    <div class="space-y-2">
                        <div class="flex justify-between items-center ml-1">
                            <label class="font-label-caps text-label-caps text-on-surface-variant"
                                for="password">密码</label>
                            <a class="font-label-caps text-label-caps text-primary hover:underline" href="#">忘记密码?</a>
                        </div>
                        <div class="relative group">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[22px] transition-colors group-focus-within:text-primary">lock</span>
                            <input
                                class="w-full bg-surface-container-low border border-outline-variant/50 rounded-xl py-4 pl-12 pr-14 font-body-lg text-body-lg outline-none transition-all focus:border-primary focus:ring-1 focus:ring-primary focus:bg-white"
                                id="password" placeholder="请输入您的密码" type="password">
                            <button
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors"
                                onclick="togglePassword()" type="button">
                                <span class="material-symbols-outlined text-[22px]" id="pass-icon">visibility</span>
                            </button>
                        </div>
                    </div>
                    <!-- Primary Action -->
                    <div class="pt-4">
                        <button
                            class="w-full bg-primary text-white font-headline-md py-4 rounded-xl shadow-lg shadow-primary/20 hover:brightness-110 active:scale-[0.99] transition-all flex items-center justify-center gap-stack-sm">
                            立即登录
                            <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
                        </button>
                    </div>
                </form>
                <div class="mt-10 flex flex-col items-center gap-6">
                    <div class="w-full flex items-center gap-4 text-outline-variant/50">
                        <div class="h-[1px] flex-1 bg-outline-variant/30"></div>
                        <span class="font-label-caps text-label-caps text-outline">其他登录方式</span>
                        <div class="h-[1px] flex-1 bg-outline-variant/30"></div>
                    </div>
                    <div class="grid gap-4 w-full flex flex-col">
                        <button
                            class="bg-surface-container-high/50 text-on-surface-variant font-body-md py-3.5 rounded-xl hover:bg-surface-dim transition-colors flex items-center justify-center gap-2">
                            <span class="material-symbols-outlined text-[20px]">person_add</span>
                            注册账号
                        </button>

                    </div>
                </div>
                <!-- Desktop Footer -->
                <footer class="mt-12 text-center lg:text-left opacity-40">
                    <p class="text-[12px] font-body-md text-on-surface-variant">© 2024 轻账本 Serene Ledger. All Rights
                        Reserved.</p>
                </footer>
            </main>
        </div>
    </div>
    <script>
        function togglePassword() {
            const passInput = document.getElementById('password');
            const icon = document.getElementById('pass-icon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                passInput.type = 'password';
                icon.innerText = 'visibility';
            }
        }
    </script>


</body>

</html>
