<!DOCTYPE html>

<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&amp;display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "income-teal": "#4EBABA",
                        "primary-container": "#4ebaba",
                        "inverse-on-surface": "#eff1f2",
                        "expense-red": "#F26D5F",
                        "secondary": "#a8372d",
                        "on-primary-fixed-variant": "#004f50",
                        "secondary-fixed-dim": "#ffb4aa",
                        "primary-fixed-dim": "#6ed7d7",
                        "on-primary": "#ffffff",
                        "text-secondary": "#6A7178",
                        "on-secondary-fixed": "#410001",
                        "tertiary-fixed-dim": "#ffb693",
                        "surface-dim": "#d8dadb",
                        "secondary-container": "#ff7768",
                        "tertiary-fixed": "#ffdbcc",
                        "on-secondary-container": "#710d0b",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "surface-variant": "#e1e3e4",
                        "on-background": "#191c1d",
                        "on-secondary-fixed-variant": "#871f19",
                        "on-tertiary-container": "#6b2c08",
                        "background": "#f8fafb",
                        "surface-white": "#FFFFFF",
                        "on-surface": "#191c1d",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#3d4949",
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "surface-tint": "#006a6a",
                        "surface": "#f8fafb",
                        "primary-fixed": "#8bf3f3",
                        "inverse-surface": "#2e3132",
                        "tertiary-container": "#ee9468",
                        "surface-container-low": "#f2f4f5",
                        "surface-container-highest": "#e1e3e4",
                        "surface-container-high": "#e6e8e9",
                        "on-tertiary-fixed-variant": "#75340f",
                        "on-tertiary-fixed": "#351000",
                        "text-primary": "#1A1C1E",
                        "secondary-fixed": "#ffdad5",
                        "inverse-primary": "#6ed7d7",
                        "surface-bright": "#f8fafb",
                        "surface-container": "#eceeef",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "outline": "#6d7979",
                        "primary": "#006a6a",
                        "tertiary": "#924b25",
                        "on-primary-fixed": "#002020",
                        "on-primary-container": "#004747",
                        "outline-variant": "#bcc9c8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-md": "16px",
                        "margin-tablet": "24px",
                        "gutter": "12px",
                        "stack-lg": "24px",
                        "base": "4px",
                        "stack-sm": "8px",
                        "margin-mobile": "16px"
                    },
                    "fontFamily": {
                        "num-md": ["manrope"],
                        "headline-lg-mobile": ["manrope"],
                        "body-md": ["manrope"],
                        "headline-lg": ["manrope"],
                        "display-num": ["manrope"],
                        "label-caps": ["manrope"],
                        "headline-md": ["manrope"],
                        "body-lg": ["manrope"]
                    },
                    "fontSize": {
                        "num-md": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "display-num": ["40px", { "lineHeight": "48px", "letterSpacing": "-1px", "fontWeight": "700" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "700" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .soft-shadow {
            box-shadow: 0 4px 12px rgba(0, 106, 106, 0.04);
        }

        .bg-mesh {
            background-color: #4EBABA;
            background-image:
                radial-gradient(at 0% 0%, hsla(180, 52%, 60%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(180, 60%, 55%, 1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(180, 45%, 65%, 1) 0, transparent 50%);
        }
    </style>
</head>

<body class="bg-surface font-body-md text-on-surface antialiased overflow-hidden">
    <!-- Main Layout Container -->
    <main class="flex h-screen w-full">
        <!-- Left Side: Brand Section -->
        <section class="hidden md:flex md:w-1/2 bg-mesh relative flex-col justify-between p-12 overflow-hidden">
            <!-- Decorative Elements -->
            <div class="absolute top-[-10%] left-[-10%] w-[400px] h-[400px] bg-white/10 rounded-full blur-3xl"></div>
            <div class="absolute bottom-[-5%] right-[-5%] w-[300px] h-[300px] bg-white/5 rounded-full blur-2xl"></div>
            <!-- Header/Logo -->
            <div class="relative z-10 flex items-center space-x-3">
                <div
                    class="w-12 h-12 bg-white/20 backdrop-blur-md rounded-xl flex items-center justify-center border border-white/30">
                    <span class="material-symbols-outlined text-white text-3xl"
                        data-icon="account_balance_wallet">account_balance_wallet</span>
                </div>
                <h1 class="font-headline-lg text-headline-lg text-white tracking-tight">轻账本</h1>
            </div>
            <!-- Content Area -->
            <div class="relative z-10 max-w-md">
                <h2 class="font-headline-lg text-headline-lg text-white mb-4 leading-snug">
                    繁至极简，<br />美而有序
                </h2>
                <p class="font-body-lg text-body-lg text-white/80">
                    别担心，我们帮您找回账号。理财的路上，每一步都算数。
                </p>
            </div>
            <!-- Footer Graphic (Abstract Representation) -->
            <div class="relative z-10">
                <div
                    class="w-full h-64 bg-white/10 backdrop-blur-sm rounded-2xl border border-white/20 p-6 flex items-end">
                    <div class="w-full space-y-4">
                        <div class="h-2 w-3/4 bg-white/30 rounded-full"></div>
                        <div class="h-2 w-1/2 bg-white/20 rounded-full"></div>
                        <div class="flex space-x-2">
                            <div class="h-12 w-12 bg-white/40 rounded-lg"></div>
                            <div class="h-12 w-12 bg-white/20 rounded-lg"></div>
                            <div class="h-12 w-12 bg-white/20 rounded-lg"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <!-- Right Side: Form Section -->
        <section class="w-full md:w-1/2 flex flex-col justify-center items-center bg-surface p-margin-mobile md:p-12">
            <div class="w-full max-w-sm">
                <!-- Mobile Logo (Hidden on Desktop) -->
                <div class="md:hidden flex items-center justify-center mb-10">
                    <div class="flex items-center space-x-2">
                        <span class="material-symbols-outlined text-income-teal text-3xl"
                            data-icon="account_balance_wallet">account_balance_wallet</span>
                        <h1 class="font-headline-md text-headline-md text-primary">轻账本</h1>
                    </div>
                </div>
                <!-- Form Header -->
                <div class="mb-8">
                    <h3 class="font-headline-lg text-headline-lg text-text-primary mb-2">找回密码</h3>
                    <p class="font-body-md text-body-md text-text-secondary">
                        请输入您的注册用户名或邮箱，我们将为您发送验证信息。
                    </p>
                </div>
                <!-- Reset Password Form -->
                <form class="space-y-6" onsubmit="event.preventDefault();">
                    <div class="space-y-2">
                        <label class="font-label-caps text-label-caps text-on-surface-variant ml-1" for="identifier">用户名
                            / 邮箱</label>
                        <div class="relative flex items-center group">
                            <span
                                class="material-symbols-outlined absolute left-4 text-outline group-focus-within:text-primary transition-colors"
                                data-icon="mail">mail</span>
                            <input
                                class="w-full h-12 pl-12 pr-4 bg-surface-container-low border border-outline-variant rounded-xl text-body-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline-variant"
                                id="identifier" placeholder="example@email.com" type="text" />
                        </div>
                    </div>
                    <button
                        class="w-full h-12 bg-income-teal text-on-primary font-headline-md text-headline-md rounded-xl shadow-md hover:bg-primary transition-all active:scale-[0.98] flex items-center justify-center space-x-2"
                        type="submit">
                        <span>发送验证信息</span>
                        <span class="material-symbols-outlined text-[20px]" data-icon="send">send</span>
                    </button>
                </form>
                <!-- Navigation Back -->
                <div class="mt-12 text-center">
                    <a class="inline-flex items-center space-x-2 text-primary font-body-md hover:underline group"
                        href="#">
                        <span
                            class="material-symbols-outlined text-[18px] transition-transform group-hover:-translate-x-1"
                            data-icon="arrow_back">arrow_back</span>
                        <span>返回登录</span>
                    </a>
                </div>
                <!-- Security Footer -->
                <div
                    class="mt-24 pt-8 border-t border-outline-variant/30 flex justify-center items-center space-x-4 opacity-50">
                    <div class="flex items-center space-x-1">
                        <span class="material-symbols-outlined text-[16px]"
                            data-icon="verified_user">verified_user</span>
                        <span class="text-[10px] font-label-caps">SECURE SSL</span>
                    </div>
                    <div class="w-1 h-1 bg-outline rounded-full"></div>
                    <div class="flex items-center space-x-1">
                        <span class="material-symbols-outlined text-[16px]" data-icon="lock">lock</span>
                        <span class="text-[10px] font-label-caps">ENCRYPTED</span>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <!-- Background Illustration (Abstract Canvas) -->
    <div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 opacity-10">
        <img alt="abstract-background" class="w-full h-full object-cover grayscale"
            data-alt="A sophisticated minimalist abstract digital art piece with flowing organic curves and soft gradients. The visual style is inspired by modern architectural renders, featuring smooth textures and a serene light-mode atmosphere. Subdued tones of teal and white create a calm and professional mood suitable for a premium financial application. The lighting is diffused and overhead, casting gentle shadows."
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuB8iw_98jA_GbfmxZZPEJtm7umQhR_Va6C9jYQR9ydyWS92GnF-_Itt7QEbXWeC2gN9TiXD-uHT9Is8BYsphe2ybkuKlYENn3Js4Ym2cvWCMTqsd5npHP0JbYKc-hW5N3LX2lQ8fXtxsVpZsfgCdxVJeoY0CA0MyQzkiKNnKmRHpjXqfESgICZz40gNtUEE2BIvc17XY-_P9r3LoCdOjnXvDYF1yox6SozWfZTWojOTUQAm7_N5HAMGij-i9oFKFnN63rpHkCeNZ34" />
    </div>
    <script>
        // Simple Interaction logic
        document.querySelector('form').addEventListener('submit', function () {
            const btn = this.querySelector('button');
            const originalContent = btn.innerHTML;

            btn.disabled = true;
            btn.innerHTML = `
                <span class="animate-spin material-symbols-outlined" data-icon="progress_activity">progress_activity</span>
                <span>正在发送...</span>
            `;

            // Mock success state after 1.5s
            setTimeout(() => {
                btn.classList.replace('bg-income-teal', 'bg-green-500');
                btn.innerHTML = `
                    <span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
                    <span>已发送</span>
                `;

                setTimeout(() => {
                    btn.classList.replace('bg-green-500', 'bg-income-teal');
                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                }, 3000);
            }, 1500);
        });
    </script>
</body>

</html>
