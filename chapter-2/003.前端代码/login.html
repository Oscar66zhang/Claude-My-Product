            manrope: ['Manrope', 'sans-serif'],

        }
      }
    }
  </script>

      font-family: 'Manrope', sans-serif;
    }

      border: 1px solid rgba(255, 255, 255, 0.2);

      box-shadow: 0 4px 12px rgba(0, 106, 106, 0.04);

</head>

      <div class="relative z-10 max-w-lg text-white">

              <img class="w-10 h-10 rounded-full border-2 border-primary"
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuBgaoPrlLlOmdxMnL-xZnLFgoyUAVrdKia6bSgehbG6tBfztoY18YDjw-cwEWuPUhaB_DKuvFooy3qPPoA0KW7oiyKJyKCxX7WgJ4j4-vF9B-Ry5IQ3j73RlYS3iZ3mnWrSUPcGHFjzCx8iw5SIG9Sf-9LSZwmEMfA7NB85myqYTUymYswYGdy90yjypibTWoVWMkQ7Wp4kxj2BUtWNV9xyNQ5PaFGfgXT74FiTIX8fm50xeNRxIN9kNlPWGRKCkYK7sdeeOU9AArw"

              <img class="w-10 h-10 rounded-full border-2 border-primary"

                alt="User">
            </div>
            <div>
              <p class="font-bold text-white">10k+ 用户已加入</p>
              <p class="text-sm text-white/70">值得信赖的极简记账伴侣</p>
            </div>
          </div>

          <!-- Abstract Visualization -->
          <div class="mt-8 opacity-40">
            <div class="flex items-end gap-1 h-24">
              <div class="w-3 bg-white rounded-t-full transition-all duration-1000" style="height: 40%"></div>
              <div class="w-3 bg-white rounded-t-full transition-all duration-1000 delay-100" style="height: 70%"></div>
              <div class="w-3 bg-white rounded-t-full transition-all duration-1000 delay-200" style="height: 55%"></div>
              <div class="w-3 bg-white rounded-t-full transition-all duration-1000 delay-300" style="height: 90%"></div>
              <div class="w-3 bg-white rounded-t-full transition-all duration-1000 delay-400" style="height: 65%"></div>
              <div class="w-3 bg-white rounded-t-full transition-all duration-1000 delay-500" style="height: 85%"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Right Side: Login Form -->
    <section class="w-full lg:w-1/2 bg-surface flex flex-col justify-center items-center p-8">
      <div class="max-w-md w-full">
        <!-- Mobile Logo -->
        <div class="lg:hidden flex items-center justify-center mb-10">
          <span class="material-symbols-outlined text-income-teal text-[28px]">account_balance_wallet</span>
          <span class="text-primary font-bold text-xl ml-2">轻账本</span>
        </div>

        <!-- Form Card -->
        <div class="bg-surface-white rounded-2xl card-shadow p-8 border border-surface-container-low">
          <!-- Form Header -->
          <div class="mb-8">
            <h3 class="text-text-primary text-[28px] font-bold mb-2">欢迎回来</h3>
            <p class="text-text-secondary text-sm">登录您的账户继续管理财务</p>
          </div>

          <!-- Login Form -->
          <form id="loginForm" class="space-y-6">
            <!-- Email -->
            <div class="space-y-2">
              <label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant block ml-1"
                for="email">用户名 / 邮箱</label>
              <div class="relative">
                <span
                  class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline transition-colors"
                  id="emailIcon">mail</span>
                <input
                  class="w-full pl-12 pr-4 py-3.5 bg-surface-container-low border border-transparent rounded-xl text-base text-on-surface focus:bg-white focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none placeholder:text-outline-variant"
                  id="email" placeholder="输入邮箱或用户名" type="text" required>
              </div>
            </div>

            <!-- Password -->
            <div class="space-y-2">
              <label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant block ml-1"
                for="password">密码</label>
              <div class="relative">
                <span
                  class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline transition-colors"
                  id="passwordIcon">lock</span>
                <input
                  class="w-full pl-12 pr-12 py-3.5 bg-surface-container-low border border-transparent rounded-xl text-base text-on-surface focus:bg-white focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none placeholder:text-outline-variant"
                  id="password" placeholder="输入密码" type="password" required>
                <button type="button" id="togglePassword"
                  class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-primary transition-colors">
                  <span class="material-symbols-outlined text-lg">visibility</span>
                </button>
              </div>
            </div>

            <!-- Remember & Forgot -->
            <div class="flex items-center justify-between">
              <label class="flex items-center gap-2 cursor-pointer">
                <input class="w-4 h-4 rounded text-primary focus:ring-primary border-outline-variant" type="checkbox"
                  id="remember">
                <span class="text-text-secondary text-sm">记住我</span>
              </label>
              <a class="text-primary text-sm font-semibold hover:underline"
                href="src/pages/reset-password.html">忘记密码？</a>
            </div>

            <!-- Submit Button -->
            <button
              class="w-full py-3.5 bg-primary text-white rounded-xl shadow-md hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all flex items-center justify-center gap-2 font-semibold"
              type="submit">
              <span>登录</span>
              <span class="material-symbols-outlined text-lg">login</span>
            </button>
          </form>

          <!-- Divider -->
          <div class="flex items-center gap-4 my-8">
            <div class="flex-1 h-px bg-outline-variant"></div>
            <span class="text-text-secondary text-xs">或</span>
            <div class="flex-1 h-px bg-outline-variant"></div>
          </div>

          <!-- Social Login -->
          <div class="grid grid-cols-2 gap-4">
            <button
              class="flex items-center justify-center gap-2 py-3 px-4 border border-outline-variant rounded-xl hover:bg-surface-container-low transition-colors">
              <svg class="w-5 h-5" viewBox="0 0 24 24">

                  d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                <path fill="#34A853"
                  d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                <path fill="#FBBC05"
                  d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.42z" />
                <path fill="#EA4335"
                  d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
              </svg>
              <span class="text-text-primary text-sm">Google</span>
            </button>
            <button

              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="#1877F2">

                  d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />

              还没有账户？ <a class="text-primary font-bold hover:underline" href="src/pages/register.html">立即注册</a>

            <div class="flex items-center gap-1">
              <span class="material-symbols-outlined text-sm">verified_user</span>
              <span class="text-[10px] font-bold tracking-wider">SECURE SSL</span>
            </div>
            <div class="w-1 h-1 bg-outline rounded-full"></div>
            <div class="flex items-center gap-1">

            </div>

  <script src="src/scripts/app.js"></script>
  <script>
    // Input focus effects
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
      input.addEventListener('focus', () => {
        const icon = input.previousElementSibling;
        if (icon && icon.classList.contains('material-symbols-outlined')) {
          icon.classList.add('text-primary');
          icon.classList.remove('text-outline');
          icon.style.fontVariationSettings = "'FILL' 1";
        }
      });
      input.addEventListener('blur', () => {
        const icon = input.previousElementSibling;
        if (icon && icon.classList.contains('material-symbols-outlined')) {
          icon.classList.remove('text-primary');
          icon.classList.add('text-outline');
          icon.style.fontVariationSettings = "'FILL' 0";
        }
      });
    });

    // Password toggle
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const passwordIcon = document.getElementById('passwordIcon');

    togglePassword.addEventListener('click', () => {
      const type = passwordInput.type === 'password' ? 'text' : 'password';
      passwordInput.type = type;
      const icon = togglePassword.querySelector('span');
      icon.textContent = type === 'password' ? 'visibility' : 'visibility_off';
    });

    // Form submission
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showToast('请填写所有字段', 'error');
        return;
      }

      const btn = this.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span><span>登录中...</span>';

      setTimeout(() => {
        AppState.login(email, password);
        showToast('登录成功', 'success');
        window.location.href = 'src/pages/home.html';
      }, 1500);
    });
  </script>
</body>

</html>
