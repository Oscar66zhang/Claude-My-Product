      <div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary-container opacity-10 rounded-full blur-[100px]"></div>

      <div class="relative z-10 max-w-lg text-white">

        </p>

        <div class="flex flex-col gap-6">
          <div class="flex items-center gap-4 glass-card p-4 rounded-xl">
            <div class="flex -space-x-3">
              <img class="w-10 h-10 rounded-full border-2 border-primary" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDLCxRFSEX5ZhJ0VO1yhyucHnm-JqMwR3uyb6xHS1z0WRjiHgv7RLk9SL_79AriF612zMuxVnc8WR8pyDyfhSL_6333so_Vdl9Oo6iV15d-E8zldyWM2NWHW0HMxkeqOrEe9mTIEaXmz4Zsw5EpfCvLjksx7y4ETaGhPK402gYFWj249fXxV9Mzl_SC4esP4o0gwIbYR6jRkwoJb2Ib1YlKcoboUHGitcIYmetRrqn9vCDsM0WFBaQg2qVxC8TW6A_PxxZOAY1N4xI" alt="User">
              <img class="w-10 h-10 rounded-full border-2 border-primary" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBgaoPrlLlOmdxMnL-xZnLFgoyUAVrdKia6bSgehbG6tBfztoY18YDjw-cwEWuPUhaB_DKuvFooy3qPPoA0KW7oiyKJyKCxX7WgJ4j4-vF9B-Ry5IQ3j73RlYS3iZ3mnWrSUPcGHFjzCx8iw5SIG9Sf-9LSZwmEMfA7NB85myqYTUymYswYGdy90yjypibTWoVWMkQ7Wp4kxj2BUtWNV9xyNQ5PaFGfgXT74FiTIX8fm50xeNRxIN9kNlPWGRKCkYK7sdeeOU9AArw" alt="User">
              <img class="w-10 h-10 rounded-full border-2 border-primary" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDzTtUuHEk5vSCSxvbrSHFP5i3BA2uBoASwLaceUqnjuYkuOwRiZiWlPsCtuoeSK3bLgdr_G2StXyS-ogjT0ePEBKfsfP8ZTJENJktDFzPrar4DopWs7jMGRhTRHeKyLRbpiur_yOkGnvlTBJW8r6wAcn6-IlSi61fuT-TZ5Kdi4zidoc7WgYtiIQ17jx5-6oKZfdnY-bRzmGbWShcBor8vz12-2Lx6bG8CQGhgA1yjRVbqqlYV77ZS1pBXx2WyxGYY1W-lc6ZZxP0" alt="User">
            </div>
            <div>
              <p class="font-bold text-white">10k+ 用户已加入</p>
              <p class="text-sm text-white/70">值得信赖的极简记账伴侣</p>
            </div>
          </div>

          <div class="mt-8 opacity-40">
            <div class="flex items-end gap-1 h-24">
              <div class="w-3 bg-white rounded-t-full" style="height: 40%"></div>
              <div class="w-3 bg-white rounded-t-full" style="height: 70%"></div>
              <div class="w-3 bg-white rounded-t-full" style="height: 55%"></div>
              <div class="w-3 bg-white rounded-t-full" style="height: 90%"></div>
              <div class="w-3 bg-white rounded-t-full" style="height: 65%"></div>
              <div class="w-3 bg-white rounded-t-full" style="height: 85%"></div>
            </div>

    <!-- Right Side: Register Form -->
    <section class="w-full lg:w-1/2 bg-surface flex flex-col justify-center items-center p-8">
      <div class="max-w-md w-full">
        <!-- Mobile Logo -->
        <div class="lg:hidden flex items-center justify-center mb-10">
          <span class="material-symbols-outlined text-income-teal text-[28px]">account_balance_wallet</span>
          <span class="text-primary font-bold text-xl ml-2">轻账本</span>
        </div>

        <!-- Form Card -->
        <div class="bg-surface-white rounded-2xl card-shadow p-8 border border-surface-container-low">
          <div class="mb-8">
            <h3 class="text-text-primary text-[28px] font-bold mb-2">创建您的账户</h3>
            <p class="text-text-secondary text-sm">开启高效理财的第一步</p>
          </div>

          <form id="registerForm" class="space-y-5">
            <!-- Username -->
            <div class="space-y-2">
              <label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant block ml-1" for="username">用户名</label>
              <div class="relative">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline transition-colors">person</span>
                <input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-low border border-transparent rounded-xl text-base text-on-surface focus:bg-white focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none placeholder:text-outline-variant" id="username" placeholder="请设置您的用户名" type="text" required>
              </div>
            </div>

            <!-- Email -->
            <div class="space-y-2">
              <label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant block ml-1" for="email">邮箱</label>
              <div class="relative">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline transition-colors">mail</span>
                <input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-low border border-transparent rounded-xl text-base text-on-surface focus:bg-white focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none placeholder:text-outline-variant" id="email" placeholder="example@email.com" type="email" required>
              </div>
            </div>

            <!-- Password -->
            <div class="space-y-2">
              <label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant block ml-1" for="password">密码</label>
              <div class="relative">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline transition-colors">lock</span>
                <input class="w-full pl-12 pr-12 py-3.5 bg-surface-container-low border border-transparent rounded-xl text-base text-on-surface focus:bg-white focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none placeholder:text-outline-variant" id="password" placeholder="请输入 6-20 位密码" type="password" required>
                <button type="button" id="togglePassword" class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-primary transition-colors">
                  <span class="material-symbols-outlined text-lg">visibility</span>
                </button>
              </div>
            </div>

            <!-- Confirm Password -->
            <div class="space-y-2">
              <label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant block ml-1" for="confirm_password">确认密码</label>
              <div class="relative">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline transition-colors">lock_reset</span>
                <input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-low border border-transparent rounded-xl text-base text-on-surface focus:bg-white focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none placeholder:text-outline-variant" id="confirm_password" placeholder="请再次输入密码" type="password" required>
              </div>
            </div>

            <!-- Terms -->
            <div class="flex items-start gap-3 mt-2">
              <input class="mt-1 w-4 h-4 rounded text-primary focus:ring-primary border-outline-variant cursor-pointer" id="terms" type="checkbox" required>
              <label class="text-text-secondary text-sm cursor-pointer" for="terms">
                我已阅读并同意 <a class="text-primary font-semibold hover:underline" href="#">《用户服务协议》</a> 与 <a class="text-primary font-semibold hover:underline" href="#">《隐私政策》</a>
              </label>
            </div>

            <!-- Submit -->
            <button class="w-full py-3.5 bg-primary text-white rounded-xl shadow-md hover:opacity-90 active:scale-[0.98] transition-all font-semibold" type="submit">立即注册</button>
          </form>

          <div class="mt-6 text-center">
            <p class="text-text-secondary text-sm">已有账号？ <a class="text-primary font-bold hover:underline" href="../../login.html">立即登录</a></p>
          </div>
        </div>
      </div>

      <footer class="mt-8 text-center lg:hidden">
        <p class="text-xs font-bold uppercase tracking-wider text-outline-variant">© 2024 轻账本 Serene Ledger. All Rights Reserved.</p>
      </footer>
    </section>
  </main>

  <script src="../../src/scripts/api.js"></script>
  <script src="../../src/scripts/app.js"></script>
  <script>
    const toggleBtn = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');

    toggleBtn.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      toggleBtn.querySelector('span').textContent = isPassword ? 'visibility_off' : 'visibility';
    });

    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm_password').value;

      if (!username || !password || !confirmPassword) {
        showToast('请填写所有字段', 'error');
        return;
      }

      if (password.length < 6) {
        showToast('密码长度至少为6位', 'error');
        return;
      }

      if (password !== confirmPassword) {
        showToast('两次输入的密码不一致', 'error');
        return;
      }

      if (!document.getElementById('terms').checked) {
        showToast('请阅读并同意用户协议', 'error');
        return;
      }

      const btn = this.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span><span>注册中...</span>';

      try {
        // 使用 username 作为昵称
        const result = await AuthAPI.register(username, password, username);
        if (result.success) {
          showToast('注册成功！即将跳转到首页...', 'success');
          setTimeout(() => window.location.href = 'home.html', 1500);
        } else {
          showToast(result.message || '注册失败', 'error');
          btn.disabled = false;
          btn.textContent = '立即注册';
        }
      } catch (error) {
        showToast(error.message, 'error');
        btn.disabled = false;
        btn.textContent = '立即注册';
      }
    });
  </script>
</body>
</html>
