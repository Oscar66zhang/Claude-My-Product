<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>找回密码 - 轻账本</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-20..200&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#006a6a',
            'on-primary': '#ffffff',
            'primary-container': '#4ebaba',
            'on-primary-container': '#004747',
            'income-teal': '#4EBABA',
            'expense-red': '#F26D5F',
            'surface': '#f8fafb',
            'surface-white': '#FFFFFF',
            'surface-container-low': '#f2f4f5',
            'surface-container-high': '#e6e8e9',
            'surface-container-lowest': '#ffffff',
            'text-primary': '#1A1C1E',
            'text-secondary': '#6A7178',
            'on-surface': '#191c1d',
            'on-surface-variant': '#3d4949',
            'outline': '#6d7979',
            'outline-variant': '#bcc9c8',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Manrope', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .teal-gradient { background: linear-gradient(135deg, #4ebaba 0%, #006a6a 100%); }
    .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    .card-shadow { box-shadow: 0 4px 12px rgba(0, 106, 106, 0.04); }
  </style>
</head>
<body class="bg-surface text-on-surface antialiased overflow-hidden">
  <main class="flex min-h-screen w-full">
    <!-- Left Brand Section -->
    <section class="hidden lg:flex lg:w-1/2 teal-gradient relative items-center justify-center p-12 overflow-hidden">
      <div class="absolute top-[-10%] left-[-10%] w-[400px] h-[400px] bg-white opacity-5 rounded-full blur-[80px]"></div>
      <div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary-container opacity-10 rounded-full blur-[100px]"></div>

      <div class="relative z-10 max-w-lg text-white">
        <div class="mb-12 flex items-center gap-4">
          <div class="w-16 h-16 bg-white rounded-xl flex items-center justify-center shadow-lg">
            <span class="material-symbols-outlined text-primary text-[40px]">account_balance_wallet</span>
          </div>
          <h1 class="text-[32px] font-extrabold tracking-tight">轻账本</h1>
        </div>

        <h2 class="text-[28px] font-semibold mb-6 leading-tight">繁至极简，美而有序。</h2>
        <p class="text-base text-white/90 leading-relaxed mb-12 opacity-80">
          别担心，我们帮您找回账号。理财的路上，每一步都算数。
        </p>

        <div class="glass-card p-6 rounded-xl">
          <div class="flex items-center gap-4 mb-4">
            <span class="material-symbols-outlined text-3xl">lock</span>
            <div>
              <p class="font-bold text-white">安全可靠</p>
              <p class="text-sm text-white/70">您的密码经过加密保护</p>
            </div>
          </div>
          <div class="flex items-center gap-4">
            <span class="material-symbols-outlined text-3xl">verified_user</span>
            <div>
              <p class="font-bold text-white">隐私保障</p>
              <p class="text-sm text-white/70">数据仅存储在本地设备</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Right Form Section -->
    <section class="w-full lg:w-1/2 bg-surface flex flex-col justify-center items-center p-8">
      <div class="max-w-md w-full">
        <!-- Mobile Logo -->
        <div class="lg:hidden flex items-center justify-center mb-10">
          <span class="material-symbols-outlined text-income-teal text-[28px]">account_balance_wallet</span>
          <span class="text-primary font-bold text-xl ml-2">轻账本</span>
        </div>

        <!-- Form Card -->
        <div class="bg-surface-white rounded-2xl card-shadow p-8 border border-surface-container-low">
          <div class="mb-8">
            <h3 class="text-text-primary text-[28px] font-bold mb-2">找回密码</h3>
            <p class="text-text-secondary text-sm">请输入您的注册用户名或邮箱</p>
          </div>

          <form id="resetForm" class="space-y-5">
            <div class="space-y-2">
              <label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant block ml-1" for="identifier">用户名 / 邮箱</label>
              <div class="relative">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline transition-colors">mail</span>
                <input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-low border border-transparent rounded-xl text-base text-on-surface focus:bg-white focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none placeholder:text-outline-variant" id="identifier" placeholder="example@email.com" type="text" required>
              </div>
            </div>

            <button class="w-full py-3.5 bg-primary text-white rounded-xl shadow-md hover:opacity-90 active:scale-[0.98] transition-all font-semibold flex items-center justify-center gap-2" type="submit">
              <span>发送验证信息</span>
              <span class="material-symbols-outlined">send</span>
            </button>
          </form>

          <div class="mt-6 text-center">
            <a class="inline-flex items-center gap-2 text-primary font-bold hover:underline group" href="../../login.html">
              <span class="material-symbols-outlined text-lg transition-transform group-hover:-translate-x-1">arrow_back</span>
              <span>返回登录</span>
            </a>
          </div>
        </div>

        <div class="mt-8 pt-8 border-t border-outline-variant/30 flex justify-center items-center gap-4 opacity-50">
          <div class="flex items-center gap-1">
            <span class="material-symbols-outlined text-[16px]">verified_user</span>
            <span class="text-[10px] font-bold tracking-wider">SECURE SSL</span>
          </div>
          <div class="w-1 h-1 bg-outline rounded-full"></div>
          <div class="flex items-center gap-1">
            <span class="material-symbols-outlined text-[16px]">lock</span>
            <span class="text-[10px] font-bold tracking-wider">ENCRYPTED</span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="../scripts/app.js"></script>
  <script>
    document.getElementById('resetForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const identifier = document.getElementById('identifier').value;
      if (!identifier) { showToast('请输入用户名或邮箱', 'error'); return; }

      const btn = this.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span><span>发送中...</span>';

      setTimeout(() => {
        btn.classList.remove('bg-primary');
        btn.classList.add('bg-green-500');
        btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span><span>已发送</span>';
        showToast('验证信息已发送，请查收', 'success');

        setTimeout(() => {
          btn.classList.remove('bg-green-500');
          btn.classList.add('bg-primary');
          btn.innerHTML = '<span>发送验证信息</span><span class="material-symbols-outlined">send</span>';
          btn.disabled = false;
        }, 3000);
      }, 1500);
    });
  </script>
</body>
</html>
